name: Bug Report
description: Report a bug in ClinicalRounds
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

        **Important:** Do NOT include any real patient data or PHI in bug reports.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
      placeholder: "When I paste a note and click analyze, the specialist grid shows..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Paste a clinical note
        3. Click 'Analyze'
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Intake parsing
        - Specialist analysis
        - Cross-consultation
        - Synthesis / A&P output
        - UI / Display
        - API routes
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 120, Safari 17, Firefox 121"

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Local development (npm run dev)
        - Self-hosted production
        - Vercel
        - Docker
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Console errors / logs
      description: Paste any relevant console errors (browser or server).
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (screenshots, environment details, etc.)
