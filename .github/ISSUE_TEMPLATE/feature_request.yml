name: Feature Request
description: Suggest a feature or improvement for ClinicalRounds
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What clinical workflow does it improve?
      placeholder: "When reviewing complex ICU patients, I need..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New specialist
        - Specialist prompt improvement
        - UI / UX
        - Analysis pipeline
        - Output format
        - Deployment / DevOps
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or references (clinical guidelines, etc.)
